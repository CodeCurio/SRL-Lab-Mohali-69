<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- Background -->
  <rect width="320" height="160" fill="white"/>
  
  <!-- Microscope icon (grey) -->
  <g transform="translate(10, 10) scale(0.85)" fill="#8a9ba8">
    <!-- Microscope body -->
    <rect x="30" y="55" width="8" height="38" rx="2"/>
    <rect x="20" y="90" width="28" height="8" rx="3"/>
    <rect x="25" y="95" width="18" height="20" rx="3"/>
    <!-- arm -->
    <rect x="34" y="20" width="8" height="38" rx="2" transform="rotate(-15 38 39)"/>
    <!-- eye piece -->
    <rect x="38" y="10" width="14" height="20" rx="5"/>
    <!-- stage -->
    <rect x="15" y="60" width="38" height="6" rx="2"/>
    <!-- base -->
    <rect x="10" y="110" width="48" height="8" rx="4"/>
  </g>
  
  <!-- SRL text -->
  <!-- S in blue -->
  <text x="78" y="105" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="82" fill="#1877F2">S</text>
  <!-- R in red -->
  <text x="130" y="105" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="82" fill="#E31E24">R</text>
  <!-- L in green -->
  <text x="188" y="105" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="82" fill="#22C55E">L</text>
  
  <!-- Lab Mohali text -->
  <text x="78" y="130" font-family="Georgia, serif" font-weight="600" font-size="24" fill="#4a6580">Lab Mohali</text>
  
  <!-- Home Collection banner -->
  <rect x="78" y="138" width="220" height="20" rx="4" fill="#1877F2"/>
  <text x="188" y="153" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle">Home Collection</text>
</svg>
